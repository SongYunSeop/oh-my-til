name: Publish Dev

on:
  push:
    branches:
      - develop

jobs:
  publish-dev:
    name: Publish Dev Tag
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bump prerelease version
        run: |
          # Get the base version (e.g. 1.3.0) from package.json
          BASE=$(node -p "require('./package.json').version.split('-')[0]")
          # Get the latest published dev version from npm (if any)
          LATEST=$(npm view oh-my-til@dev version 2>/dev/null || echo "")
          if [ -n "$LATEST" ] && echo "$LATEST" | grep -q "^${BASE}-dev\."; then
            # Increment from the latest dev version
            npm version "$LATEST" --no-git-tag-version --allow-same-version
            npm version prerelease --preid=dev --no-git-tag-version
          else
            # Start fresh prerelease from base version
            npm version "${BASE}" --no-git-tag-version --allow-same-version
            npm version prerelease --preid=dev --no-git-tag-version
          fi

      - name: Publish to npm (dev tag)
        run: npm publish --tag dev
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
